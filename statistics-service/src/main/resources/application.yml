spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:statistics_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

services:
  model-management:
    base-url: ${MODEL_MANAGEMENT_BASE_URL:http://localhost:8081}

server:
  port: ${SERVER_PORT:8082}

feign:
  circuitbreaker:
    enabled: true
