spring:
  datasource:
    url: jdbc:mysql://localhost:3306/statistics_db
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
services:
  model-management:
    base-url: ${MODEL_MANAGEMENT_BASE_URL:http://localhost:8081}

server:
  port: ${SERVER_PORT:8082}

feign:
  circuitbreaker:
    enabled: true
