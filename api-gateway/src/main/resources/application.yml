server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - PUT
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: model-management-route
          uri: ${MODEL_MANAGEMENT_BASE_URL:http://localhost:8081}
          predicates:
            - Path=/api/models/**
