server:
  port: ${SERVER_PORT:8080}

services:
  model-management:
    base-url: ${MODEL_MANAGEMENT_BASE_URL:http://localhost:8081}
  statistics:
    base-url: ${STATISTICS_BASE_URL:http://localhost:8082}

spring:
  cloud:
    gateway:
      routes:
        - id: model-management-route
          uri: ${services.model-management.base-url}
          predicates:
            - Path=/api/models/**
        - id: statistics-route
          uri: ${services.statistics.base-url}
          predicates:
            - Path=/api/statistics/**
